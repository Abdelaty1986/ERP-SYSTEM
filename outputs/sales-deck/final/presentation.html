<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>عرض نظام ERP</title>
  <style>
    :root {
      --bg: #f4f7f8;
      --panel: #ffffff;
      --ink: #17313b;
      --muted: #5f7280;
      --accent: #1f8a63;
      --accent-dark: #146247;
      --line: #dbe5e8;
      --warn: #b7791f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      background: linear-gradient(135deg, #edf5f2, #f7f9fb);
      color: var(--ink);
    }
    .wrap {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
    }
    .visual {
      background: #dfe8eb;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      border-left: 1px solid rgba(0,0,0,0.05);
    }
    .visual img {
      width: 100%;
      height: calc(100vh - 36px);
      object-fit: contain;
      border-radius: 18px;
      box-shadow: 0 24px 60px rgba(15, 34, 41, 0.18);
      background: white;
    }
    .content {
      padding: 38px 42px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .eyebrow {
      color: var(--accent-dark);
      font-size: 14px;
      font-weight: 700;
    }
    h1 {
      font-size: 44px;
      line-height: 1.15;
      margin: 6px 0 12px;
    }
    .subtitle {
      font-size: 20px;
      line-height: 1.8;
      color: var(--muted);
      margin: 0;
    }
    .card {
      background: rgba(255,255,255,0.92);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 22px 24px;
      box-shadow: 0 18px 40px rgba(18, 48, 61, 0.08);
    }
    .script { min-height: 240px; }
    .script p {
      font-size: 21px;
      line-height: 1.95;
      margin: 0;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }
    button {
      border: 0;
      background: var(--accent);
      color: white;
      padding: 12px 18px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }
    button.secondary {
      background: white;
      color: var(--ink);
      border: 1px solid var(--line);
    }
    button.warn {
      background: #fff8eb;
      color: #8a5a12;
      border: 1px solid #efd8aa;
    }
    .status {
      font-size: 14px;
      color: var(--muted);
    }
    .progress {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
    }
    .dot {
      height: 8px;
      border-radius: 999px;
      background: #d6e1e4;
      overflow: hidden;
    }
    .dot.active {
      background: rgba(31, 138, 99, 0.18);
    }
    .dot.active::after {
      content: "";
      display: block;
      width: 100%;
      height: 100%;
      background: var(--accent);
    }
    .notes {
      font-size: 15px;
      line-height: 1.8;
      color: var(--muted);
    }
    .notes strong {
      color: var(--ink);
    }
    .audio-hint {
      color: var(--warn);
      font-weight: 700;
    }
    @media (max-width: 1100px) {
      .wrap { grid-template-columns: 1fr; }
      .visual { border-left: 0; border-top: 1px solid rgba(0,0,0,0.05); order: 2; }
      .visual img { height: auto; max-height: 65vh; }
      .content { order: 1; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="content">
      <div>
        <div class="eyebrow" id="eyebrow">عرض تقديمي</div>
        <h1 id="title"></h1>
        <p class="subtitle" id="subtitle"></p>
      </div>

      <div class="card script">
        <p id="script"></p>
      </div>

      <div class="controls">
        <button id="playBtn">تشغيل العرض</button>
        <button class="secondary" id="prevBtn">السابق</button>
        <button class="secondary" id="nextBtn">التالي</button>
        <button class="warn" id="voiceBtn">تشغيل الصوت الاحترافي</button>
        <span class="status" id="status">جاهز للعرض</span>
      </div>

      <div class="progress" id="progress"></div>

      <div class="notes card">
        <strong>مهم:</strong> هذا العرض مهيأ ليعمل بملفات صوت حقيقية بصيغة `MP3`، وليس بصوت المتصفح الآلي.
        <br>
        <span class="audio-hint">إذا لم تكن ملفات الصوت موجودة داخل مجلد <code>audio</code>، سيعمل العرض بصريًا فقط بدون تعليق صوتي.</span>
        <br><br>
        أضف الملفات بهذا الشكل:
        <br>
        <code>audio/slide-01.mp3</code>
        <br>
        <code>audio/slide-02.mp3</code>
        <br>
        حتى <code>audio/slide-06.mp3</code>
      </div>
    </section>

    <section class="visual">
      <img id="slideImage" alt="ERP Sales Slide">
    </section>
  </div>

  <audio id="narration" preload="auto"></audio>

  <script>
    const slides = [
      {
        eyebrow: "الشريحة 1",
        title: "نظام ERP محاسبي وإداري جاهز للعرض والتشغيل",
        subtitle: "نسخة عملية تربط التشغيل اليومي بالأثر المحاسبي والتقارير.",
        script: "مرحبًا، هذا عرض مختصر لنظام ERP محاسبي وإداري عربي، مصمم لربط التشغيل اليومي داخل الشركة بالأثر المحاسبي والتقارير، من خلال واجهة عملية واضحة وسهلة الاستخدام.",
        image: "assets/slide-01.png",
        audio: "audio/slide-01.mp3",
        duration: 12000
      },
      {
        eyebrow: "الشريحة 2",
        title: "ما الذي يقدمه النظام للشركة؟",
        subtitle: "إدارة مستندات التشغيل اليومية مع ترابط واضح بين الشاشات والحسابات.",
        script: "النظام يدير العمليات اليومية الأساسية داخل الشركة، مثل العملاء والموردين والفواتير وسندات القبض والصرف، مع ترابط واضح بين المستندات والحسابات، بحيث تظهر المعلومة في مكانها الصحيح دون تكرار أو ارتباك.",
        image: "assets/slide-02.png",
        audio: "audio/slide-02.mp3",
        duration: 13000
      },
      {
        eyebrow: "الشريحة 3",
        title: "الموديولات الأساسية في النسخة الحالية",
        subtitle: "مبيعات ومشتريات ومخازن وحسابات وخزينة وتقارير وإدارة.",
        script: "النسخة الحالية تشمل المبيعات والمشتريات والمخازن والحسابات والخزينة والتقارير والإدارة. وهذا يجعل النظام مناسبًا للشركات التي تحتاج دورة تشغيل متكاملة بدل شاشات منفصلة لا تتواصل مع بعضها.",
        image: "assets/slide-03.png",
        audio: "audio/slide-03.mp3",
        duration: 12000
      },
      {
        eyebrow: "الشريحة 4",
        title: "دورة تشغيل واضحة من المستند إلى الحسابات",
        subtitle: "الهدف هو أن تسمع الشاشات في بعضها حتى تصل النتيجة إلى التقارير النهائية.",
        script: "قوة النظام تظهر في الدورة المستندية نفسها. في المشتريات تبدأ العملية بأمر شراء ثم إذن إضافة ثم تسجيل فاتورة المورد. وفي المبيعات تبدأ بأمر بيع ثم إذن صرف ثم إصدار فاتورة العميل. بعد ذلك ينعكس الأثر تلقائيًا على القيود والتقارير.",
        image: "assets/slide-04.png",
        audio: "audio/slide-04.mp3",
        duration: 14000
      },
      {
        eyebrow: "الشريحة 5",
        title: "قوة الرقابة والمتابعة المحاسبية",
        subtitle: "فلاتر وطباعة وتقارير مع اتزان محاسبي في نسخة الديمو الحالية.",
        script: "النظام لا يتوقف عند تسجيل المستند، بل يوفّر أدوات مراجعة ورقابة عملية، مثل فلاتر اليومية والأستاذ وكشوف الحساب، بالإضافة إلى الطباعة والتقارير، مع نسخة ديمو متزنة في ميزان المراجعة وتم اختبار مساراتها الأساسية بنجاح.",
        image: "assets/slide-05.png",
        audio: "audio/slide-05.mp3",
        duration: 13000
      },
      {
        eyebrow: "الشريحة 6",
        title: "حالة النسخة الحالية ولماذا هي جاهزة للعرض",
        subtitle: "نسخة ديمو نظيفة، مسارات رئيسية ناجحة، وواجهة محسنة بشكل واضح.",
        script: "النسخة الحالية جاهزة للعرض بشكل قوي، لأنها تحتوي على ديمو ذهبي منظم، وشاشات تشغيل مترابطة، وتقارير أساسية سليمة، وواجهة محسنة. وهذا يجعلها نقطة انطلاق ممتازة للبيع أو للتخصيص حسب طبيعة نشاط العميل.",
        image: "assets/slide-06.png",
        audio: "audio/slide-06.mp3",
        duration: 12000
      }
    ];

    const title = document.getElementById("title");
    const subtitle = document.getElementById("subtitle");
    const script = document.getElementById("script");
    const image = document.getElementById("slideImage");
    const eyebrow = document.getElementById("eyebrow");
    const status = document.getElementById("status");
    const progress = document.getElementById("progress");
    const playBtn = document.getElementById("playBtn");
    const nextBtn = document.getElementById("nextBtn");
    const prevBtn = document.getElementById("prevBtn");
    const voiceBtn = document.getElementById("voiceBtn");
    const narration = document.getElementById("narration");

    let current = 0;
    let timer = null;
    let autoPlaying = false;
    let audioEnabled = false;

    function buildProgress() {
      progress.innerHTML = "";
      slides.forEach((_, idx) => {
        const dot = document.createElement("div");
        dot.className = "dot" + (idx === current ? " active" : "");
        progress.appendChild(dot);
      });
    }

    function clearTimer() {
      if (timer) {
        clearTimeout(timer);
        timer = null;
      }
    }

    function stopAudio() {
      narration.pause();
      narration.currentTime = 0;
      narration.removeAttribute("src");
      narration.load();
    }

    async function tryPlayAudio(file) {
      try {
        narration.src = file;
        await narration.play();
        status.textContent = `يتم تشغيل الصوت للشريحة ${current + 1}`;
        return true;
      } catch (error) {
        stopAudio();
        status.textContent = `لا يوجد ملف صوت احترافي للشريحة ${current + 1}`;
        return false;
      }
    }

    async function playVoiceForCurrentSlide() {
      stopAudio();
      if (!audioEnabled) return;
      await tryPlayAudio(slides[current].audio);
    }

    async function showSlide(index) {
      current = (index + slides.length) % slides.length;
      const slide = slides[current];
      eyebrow.textContent = slide.eyebrow;
      title.textContent = slide.title;
      subtitle.textContent = slide.subtitle;
      script.textContent = slide.script;
      image.src = slide.image;
      status.textContent = `عرض الشريحة ${current + 1} من ${slides.length}`;
      buildProgress();
      await playVoiceForCurrentSlide();
    }

    function queueNext() {
      clearTimer();
      if (!autoPlaying) return;
      timer = setTimeout(async () => {
        const next = current + 1;
        if (next >= slides.length) {
          autoPlaying = false;
          playBtn.textContent = "إعادة تشغيل العرض";
          status.textContent = "انتهى العرض";
          stopAudio();
          return;
        }
        await showSlide(next);
        queueNext();
      }, slides[current].duration);
    }

    playBtn.addEventListener("click", async () => {
      autoPlaying = true;
      playBtn.textContent = "العرض يعمل";
      await showSlide(current);
      queueNext();
    });

    nextBtn.addEventListener("click", async () => {
      autoPlaying = false;
      playBtn.textContent = "تشغيل العرض";
      clearTimer();
      await showSlide(current + 1);
    });

    prevBtn.addEventListener("click", async () => {
      autoPlaying = false;
      playBtn.textContent = "تشغيل العرض";
      clearTimer();
      await showSlide(current - 1);
    });

    voiceBtn.addEventListener("click", async () => {
      audioEnabled = !audioEnabled;
      voiceBtn.textContent = audioEnabled ? "إيقاف الصوت الاحترافي" : "تشغيل الصوت الاحترافي";
      if (!audioEnabled) {
        stopAudio();
        status.textContent = "تم إيقاف الصوت";
      } else {
        await playVoiceForCurrentSlide();
      }
    });

    showSlide(0);
  </script>
</body>
</html>
