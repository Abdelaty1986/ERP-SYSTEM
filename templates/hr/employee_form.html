{% extends "layout.html" %}
{% block content %}
<style>
.hr-shell{direction:rtl;max-width:1100px;margin:0 auto}
.hr-card{background:#fff;border:1px solid #e2e8f0;border-radius:24px;padding:22px;box-shadow:0 14px 32px rgba(15,23,42,.08)}
.hr-header{background:linear-gradient(135deg,#0f172a 0%,#1d4ed8 60%,#0f766e 100%);color:#fff;border-radius:24px;padding:24px;margin-bottom:18px}
.hr-header h1{margin:0 0 8px;font-size:28px;font-weight:900}.hr-header p{margin:0;color:rgba(255,255,255,.84);line-height:1.8}
.hr-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}
.hr-field label{display:block;font-size:13px;font-weight:800;color:#475569;margin-bottom:6px}
.hr-field input,.hr-field select,.hr-field textarea{width:100%;border:1px solid #dbe3ee;border-radius:14px;padding:10px 12px;background:#fff}
.hr-field textarea{min-height:88px;resize:vertical}.hr-full{grid-column:1/-1}
.hr-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
.hr-btn{border:0;border-radius:14px;padding:10px 16px;font-weight:800;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;cursor:pointer}
.hr-btn-primary{background:#2563eb;color:#fff}.hr-btn-soft{background:#eef2ff;color:#1d4ed8}
@media(max-width:900px){.hr-grid{grid-template-columns:1fr}}
</style>

<div class="hr-shell">
  <div class="hr-header">
    <h1>تعديل بيانات الموظف</h1>
    <p>يتم تحديث بطاقة الموظف الأساسية فقط. بيانات المرتبات الشهرية تبقى داخل شاشات Payroll وPayslip.</p>
  </div>

  <div class="hr-card">
    <form method="post" class="hr-grid">
      <div class="hr-field">
        <label>كود الموظف</label>
        <input value="{{ employee.employee_code }}" disabled>
      </div>
      <div class="hr-field">
        <label>اسم الموظف</label>
        <input name="full_name" value="{{ employee.full_name }}" required>
      </div>
      <div class="hr-field">
        <label>القسم</label>
        <select name="department_id">
          <option value="">بدون قسم</option>
          {% for department in departments %}
          <option value="{{ department.id }}" {% if employee.department_id == department.id %}selected{% endif %}>{{ department.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="hr-field">
        <label>إضافة قسم جديد</label>
        <input name="department_name" placeholder="اختياري">
      </div>
      <div class="hr-field">
        <label>الوظيفة</label>
        <input name="job_title" value="{{ employee.job_title or '' }}">
      </div>
      <div class="hr-field">
        <label>تاريخ التعيين</label>
        <input name="hire_date" type="date" value="{{ employee.hire_date or '' }}">
      </div>
      <div class="hr-field">
        <label>الراتب الأساسي</label>
        <input name="base_salary" type="number" min="0" step="0.01" value="{{ employee.base_salary or 0 }}">
      </div>
      <div class="hr-field">
        <label>الحالة</label>
        <select name="status">
          <option value="active" {% if employee.normalized_status == 'active' %}selected{% endif %}>نشط</option>
          <option value="inactive" {% if employee.normalized_status != 'active' %}selected{% endif %}>غير نشط</option>
        </select>
      </div>
      <div class="hr-field">
        <label>الهاتف</label>
        <input name="phone" value="{{ employee.phone or '' }}">
      </div>
      <div class="hr-field">
        <label>البريد الإلكتروني</label>
        <input name="email" type="email" value="{{ employee.email or '' }}">
      </div>
      <div class="hr-field">
        <label>الرقم القومي</label>
        <input name="national_id" value="{{ employee.national_id or '' }}">
      </div>
      <div class="hr-field">
        <label>بداية العمل</label>
        <input name="work_start" type="time" value="{{ employee.work_start or '09:00' }}">
      </div>
      <div class="hr-field">
        <label>نهاية العمل</label>
        <input name="work_end" type="time" value="{{ employee.work_end or '17:00' }}">
      </div>
      <div class="hr-field">
        <label>رصيد الإجازات السنوي</label>
        <input name="annual_leave_balance" type="number" min="0" step="0.5" value="{{ employee.annual_leave_balance or 21 }}">
      </div>
      <div class="hr-field hr-full">
        <label>ملاحظات</label>
        <textarea name="notes">{{ employee.notes or '' }}</textarea>
      </div>
      <div class="hr-full hr-actions">
        <button class="hr-btn hr-btn-primary" type="submit">حفظ التعديل</button>
        <a class="hr-btn hr-btn-soft" href="{{ url_for('hr.employee_view', employee_id=employee.id) }}">رجوع للبطاقة</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
