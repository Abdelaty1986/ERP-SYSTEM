{% extends "layout.html" %}
{% block content %}
<h2>الأرصدة الافتتاحية</h2>
<form method="POST" class="card p-3 mb-3 no-print">
    <div class="row g-2">
        <div class="col-md-2"><label class="form-label">التاريخ</label><input type="date" name="date" class="form-control" required></div>
        <div class="col-md-4"><label class="form-label">الحساب</label><select name="account_id" class="form-control" required>{% for a in accounts %}<option value="{{ a[0] }}">{{ a[1] }} - {{ a[2] }}</option>{% endfor %}</select></div>
        <div class="col-md-2"><label class="form-label">الطبيعة</label><select name="side" class="form-control"><option value="debit">مدين</option><option value="credit">دائن</option></select></div>
        <div class="col-md-2"><label class="form-label">المبلغ</label><input type="number" step="0.01" min="0.01" name="amount" class="form-control" required></div>
        <div class="col-md-2"><label class="form-label">ملاحظات</label><input name="notes" class="form-control"></div>
    </div>
    <button class="btn btn-success mt-3">تسجيل</button>
</form>
<table class="table table-bordered"><tr><th>التاريخ</th><th>البيان</th><th>مدين</th><th>دائن</th><th>المبلغ</th></tr>{% for r in rows %}<tr><td>{{ r[0] }}</td><td>{{ r[1] }}</td><td>{{ r[2] }}</td><td>{{ r[3] }}</td><td>{{ r[4] }}</td></tr>{% endfor %}</table>
{% endblock %}
