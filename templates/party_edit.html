{% extends "layout.html" %}

{% block content %}
<div class="page-head">
    <h2>{{ title }}</h2>
</div>

<form method="POST" class="card p-3">
    <div class="row g-2">
        <div class="col-md-3">
            <label class="form-label">الاسم</label>
            <input type="text" name="name" value="{{ row[1] }}" class="form-control" required>
        </div>
        <div class="col-md-2">
            <label class="form-label">الهاتف</label>
            <input type="text" name="phone" value="{{ row[2] or '' }}" class="form-control">
        </div>
        <div class="col-md-3">
            <label class="form-label">العنوان</label>
            <input type="text" name="address" value="{{ row[3] or '' }}" class="form-control">
        </div>
        <div class="col-md-2">
            <label class="form-label">رقم التسجيل الضريبي</label>
            <input type="text" name="tax_registration_number" value="{{ row[4] or '' }}" class="form-control">
        </div>
        <div class="col-md-2">
            <label class="form-label">رقم البطاقة الضريبية</label>
            <input type="text" name="tax_card_number" value="{{ row[5] or '' }}" class="form-control">
        </div>
        <div class="col-md-3">
            <label class="form-label">مسؤول التواصل</label>
            <input type="text" name="contact_person" value="{{ row[6] or '' }}" class="form-control">
        </div>
        <div class="col-md-3">
            <label class="form-label">البريد الإلكتروني</label>
            <input type="email" name="email" value="{{ row[7] or '' }}" class="form-control">
        </div>
        <div class="col-md-3">
            <label class="form-label">حالة الخصم والإضافة</label>
            <select name="withholding_status" class="form-select">
                {% for value, label in withholding_choices %}
                <option value="{{ value }}" {% if row[8] == value %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
            </select>
        </div>
    </div>
    <div class="d-flex gap-2 mt-3">
        <button class="btn btn-success">حفظ</button>
        <a href="/{{ endpoint }}" class="btn btn-outline-secondary">رجوع</a>
    </div>
</form>
{% endblock %}
