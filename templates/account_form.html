{% extends "layout.html" %}

{% block content %}

<h2>تعديل الحساب</h2>

<form method="POST" class="card p-3">
    <label class="form-label">الكود</label>
    <input type="text" name="code" value="{{ account[1] }}" class="form-control mb-2" required>

    <label class="form-label">اسم الحساب</label>
    <input type="text" name="name" value="{{ account[2] }}" class="form-control mb-2" required>

    <label class="form-label">النوع</label>
    <select name="type" class="form-control mb-3" required>
        {% for account_type in account_types %}
        <option value="{{ account_type }}" {% if account_type == account[3] %}selected{% endif %}>
            {{ account_type }}
        </option>
        {% endfor %}
    </select>

    <div class="d-flex gap-2">
        <button class="btn btn-success">حفظ التعديل</button>
        <a href="/accounts" class="btn btn-secondary">رجوع</a>
    </div>
</form>

{% endblock %}
