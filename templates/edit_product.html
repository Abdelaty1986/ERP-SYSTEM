{% extends "layout.html" %}
{% block content %}
<div class="report-hero">
    <div class="page-title-wrap">
        <div class="eyebrow">المخازن</div>
        <h2>تعديل الصنف</h2>
        <p class="page-subtitle">تحديث بيانات الصنف وربطه بالتصنيف المناسب دون التأثير على الحركات السابقة.</p>
    </div>
</div>

<section class="panel-block">
    <form method="POST">
        <div class="row g-3">
            <div class="col-md-2"><label class="form-label">الكود</label><input type="text" name="code" value="{{ product[1] or '' }}" class="form-control"></div>
            <div class="col-md-3"><label class="form-label">اسم الصنف</label><input type="text" name="name" value="{{ product[2] }}" class="form-control" required></div>
            <div class="col-md-2"><label class="form-label">الوحدة</label><input type="text" name="unit" value="{{ product[3] }}" class="form-control"></div>
            <div class="col-md-2">
                <label class="form-label">التصنيف</label>
                <select name="category_id" class="form-select">
                    <option value="">بدون تصنيف</option>
                    {% for c in categories %}
                    <option value="{{ c.id }}" {% if product[7] == c.id %}selected{% endif %}>{{ c.option_label }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-2"><label class="form-label">المورد الافتراضي</label><select name="default_supplier_id" class="form-select"><option value="">بدون</option>{% for s in suppliers %}<option value="{{ s[0] }}" {% if product[6] == s[0] %}selected{% endif %}>{{ s[1] }}</option>{% endfor %}</select></div>
            <div class="col-md-1"><label class="form-label">شراء</label><input type="number" step="0.01" min="0" name="purchase_price" value="{{ product[4] }}" class="form-control"></div>
            <div class="col-md-1"><label class="form-label">بيع</label><input type="number" step="0.01" min="0" name="sale_price" value="{{ product[5] }}" class="form-control"></div>
        </div>
        <div class="mt-3 d-flex gap-2">
            <button class="btn btn-success">حفظ</button>
            <a href="/products" class="btn btn-outline-secondary">رجوع</a>
        </div>
    </form>
</section>
{% endblock %}
