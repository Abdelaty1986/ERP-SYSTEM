{% extends "layout.html" %}
{% block content %}
<h2>تعديل الموظف</h2>
<form method="POST" class="card p-3">
    <div class="row g-2">
        <div class="col-md-1"><label class="form-label">الكود</label><input type="text" name="code" value="{{ employee[1] or '' }}" class="form-control"></div>
        <div class="col-md-2"><label class="form-label">الاسم</label><input type="text" name="name" value="{{ employee[2] }}" class="form-control" required></div>
        <div class="col-md-2"><label class="form-label">القسم</label><input type="text" name="department" value="{{ employee[3] or '' }}" class="form-control"></div>
        <div class="col-md-2"><label class="form-label">الوظيفة</label><input type="text" name="job_title" value="{{ employee[4] or '' }}" class="form-control"></div>
        <div class="col-md-2"><label class="form-label">تاريخ التعيين</label><input type="date" name="hire_date" value="{{ employee[5] or '' }}" class="form-control"></div>
        <div class="col-md-1"><label class="form-label">الأساسي</label><input type="number" step="0.01" min="0" name="base_salary" value="{{ employee[6] }}" class="form-control"></div>
        <div class="col-md-1"><label class="form-label">بدلات</label><input type="number" step="0.01" min="0" name="allowances" value="{{ employee[7] }}" class="form-control"></div>
        <div class="col-md-1"><label class="form-label">تأمينات موظف</label><input type="number" step="0.01" min="0" name="insurance_employee" value="{{ employee[8] }}" class="form-control"></div>
        <div class="col-md-1"><label class="form-label">تأمينات شركة</label><input type="number" step="0.01" min="0" name="insurance_company" value="{{ employee[9] }}" class="form-control"></div>
        <div class="col-md-1"><label class="form-label">ضريبة</label><input type="number" step="0.01" min="0" name="tax" value="{{ employee[10] }}" class="form-control"></div>
        <div class="col-md-4"><label class="form-label">ملاحظات</label><input type="text" name="notes" value="{{ employee[11] or '' }}" class="form-control"></div>
    </div>
    <div class="mt-3"><button class="btn btn-success">حفظ</button> <a href="/employees" class="btn btn-secondary">رجوع</a></div>
</form>
{% endblock %}
