{% extends "layout.html" %}

{% block content %}

<h2>تعديل القيد</h2>

<form method="POST" class="card p-3">

<label class="form-label">التاريخ</label>
<input type="date" name="date" value="{{ row[1] }}" class="form-control mb-2" required>

<label class="form-label">البيان</label>
<input type="text" name="description" value="{{ row[2] }}" class="form-control mb-2" required>

<label class="form-label">الحساب المدين</label>
<select name="debit" class="form-control mb-2" required>
{% for a in accounts %}
<option value="{{ a[0] }}"
{% if a[0] == row[3] %}selected{% endif %}>
{{ a[2] }} ({{ a[1] }})
</option>
{% endfor %}
</select>

<label class="form-label">الحساب الدائن</label>
<select name="credit" class="form-control mb-2" required>
{% for a in accounts %}
<option value="{{ a[0] }}"
{% if a[0] == row[4] %}selected{% endif %}>
{{ a[2] }} ({{ a[1] }})
</option>
{% endfor %}
</select>

<label class="form-label">المبلغ</label>
<input type="number" step="0.01" min="0.01" name="amount"
value="{{ row[5] }}" class="form-control mb-3" required>

<div class="d-flex gap-2">
    <button class="btn btn-success">حفظ التعديل</button>
    <a href="/journal" class="btn btn-secondary">رجوع</a>
</div>

</form>

{% endblock %}
