{% extends "layout.html" %}

{% block content %}

<h2>{{ title }}</h2>

<form method="POST" class="card p-3">
    <div class="row g-2">
        <div class="col-md-2">
            <label class="form-label">التاريخ</label>
            <input type="date" name="date" value="{{ voucher[1] }}" class="form-control" required>
        </div>
        <div class="col-md-4">
            <label class="form-label">الطرف</label>
            <select name="{{ party_field }}" class="form-control" required>
                {% for p in parties %}
                <option value="{{ p[0] }}" {% if voucher[2] == p[0] %}selected{% endif %}>{{ p[1] }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-2">
            <label class="form-label">المبلغ</label>
            <input type="number" step="0.01" min="0.01" name="amount" value="{{ voucher[3] }}" class="form-control" required>
        </div>
        <div class="col-md-4">
            <label class="form-label">ملاحظات</label>
            <input type="text" name="notes" value="{{ voucher[4] or '' }}" class="form-control">
        </div>
    </div>
    <div class="mt-3 d-flex gap-2">
        <button class="btn btn-success">حفظ التعديل</button>
        <a href="{{ url_for(back_endpoint) }}" class="btn btn-secondary">رجوع</a>
    </div>
</form>

{% endblock %}
