{% extends "layout.html" %}
{% block content %}
<h2>{{ title }}</h2>
<form method="POST" action="{{ action_url }}" class="card p-3">
    <div class="row g-2 mb-3">
        <div class="col-md-2"><label class="form-label">التاريخ</label><input type="date" name="date" class="form-control" required></div>
        <div class="col-md-2"><label class="form-label">الاستحقاق</label><input type="date" name="due_date" class="form-control"></div>
        <div class="col-md-2"><label class="form-label">نوع السداد</label><select name="payment_type" class="form-control"><option value="cash">نقدي</option><option value="credit">آجل</option></select></div>
        {% if party == "customer" %}
        <div class="col-md-3"><label class="form-label">العميل</label><select name="customer_id" class="form-control"><option value="">بدون عميل</option>{% for c in customers %}<option value="{{ c[0] }}">{{ c[1] }}</option>{% endfor %}</select></div>
        {% else %}
        <div class="col-md-3"><label class="form-label">المورد</label><select name="supplier_id" class="form-control"><option value="">بدون مورد</option>{% for s in suppliers %}<option value="{{ s[0] }}">{{ s[1] }}</option>{% endfor %}</select></div>
        <div class="col-md-2"><label class="form-label">رقم فاتورة المورد</label><input name="supplier_invoice_no" class="form-control" required></div>
        <div class="col-md-2"><label class="form-label">تاريخ فاتورة المورد</label><input type="date" name="supplier_invoice_date" class="form-control" required></div>
        {% endif %}
        <div class="col-md-1"><label class="form-label">ضريبة %</label><input type="number" step="0.01" min="0" name="tax_rate" value="14" class="form-control"></div>
    </div>
    <table class="table table-bordered" id="lines">
        <tr><th>الصنف</th><th>الكمية</th><th>السعر</th></tr>
        {% for i in range(5) %}
        <tr>
            <td><select name="product_id" class="form-control"><option value="">اختر</option>{% for p in products %}<option value="{{ p[0] }}" data-sale="{{ p[2] }}" data-purchase="{{ p[2] }}">{{ p[1] }} - رصيد {{ p[3] }}</option>{% endfor %}</select></td>
            <td><input type="number" step="0.01" min="0" name="quantity" class="form-control"></td>
            <td><input type="number" step="0.01" min="0" name="unit_price" class="form-control"></td>
        </tr>
        {% endfor %}
    </table>
    <button class="btn btn-success">حفظ وترحيل</button>
</form>
{% endblock %}
