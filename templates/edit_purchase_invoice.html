{% extends "layout.html" %}

{% block content %}

<h2>تعديل فاتورة مورد غير مرحلة</h2>

<form method="POST" class="card p-3">
    <div class="row g-2">
        <div class="col-md-2">
            <label class="form-label">تاريخ التسجيل</label>
            <input type="date" name="date" value="{{ invoice[1] }}" class="form-control" required>
        </div>
        <div class="col-md-2">
            <label class="form-label">رقم فاتورة المورد</label>
            <input type="text" name="supplier_invoice_no" value="{{ invoice[2] or '' }}" class="form-control" required>
        </div>
        <div class="col-md-2">
            <label class="form-label">تاريخ فاتورة المورد</label>
            <input type="date" name="supplier_invoice_date" value="{{ invoice[3] or '' }}" class="form-control" required>
        </div>
        <div class="col-md-2">
            <label class="form-label">تاريخ الاستحقاق</label>
            <input type="date" name="due_date" value="{{ invoice[4] or '' }}" class="form-control">
        </div>
        <div class="col-md-2">
            <label class="form-label">نوع السداد</label>
            <select name="payment_type" class="form-control">
                <option value="cash" {% if invoice[10] == "cash" %}selected{% endif %}>نقدي</option>
                <option value="credit" {% if invoice[10] == "credit" %}selected{% endif %}>آجل</option>
            </select>
        </div>
        <div class="col-md-2">
            <label class="form-label">المورد</label>
            <select name="supplier_id" class="form-control">
                <option value="">بدون مورد</option>
                {% for s in suppliers %}
                <option value="{{ s[0] }}" {% if invoice[5] == s[0] %}selected{% endif %}>{{ s[1] }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-3">
            <label class="form-label">المنتج</label>
            <select name="product_id" class="form-control" required>
                {% for p in products %}
                <option value="{{ p[0] }}" {% if invoice[6] == p[0] %}selected{% endif %}>{{ p[1] }} - رصيد {{ p[3] }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-2">
            <label class="form-label">الكمية</label>
            <input type="number" step="0.01" min="0.01" name="quantity" value="{{ invoice[7] }}" class="form-control" required>
        </div>
        <div class="col-md-2">
            <label class="form-label">السعر</label>
            <input type="number" step="0.01" min="0.01" name="unit_price" value="{{ invoice[8] }}" class="form-control" required>
        </div>
        <div class="col-md-2">
            <label class="form-label">ضريبة %</label>
            <input type="number" step="0.01" min="0" name="tax_rate" value="{{ invoice[9] }}" class="form-control">
        </div>
        <div class="col-md-3">
            <label class="form-label">ملاحظات</label>
            <input type="text" name="notes" value="{{ invoice[11] or '' }}" class="form-control">
        </div>
    </div>
    <div class="mt-3 d-flex gap-2">
        <button class="btn btn-success">حفظ التعديل</button>
        <a href="/purchases" class="btn btn-secondary">رجوع</a>
    </div>
</form>

{% endblock %}
